name: Validate Skill

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-store-connect-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependency
        run: python -m pip install pyyaml
      - name: Validate skill metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import yaml

          text = Path("SKILL.md").read_text(encoding="utf-8")
          match = re.match(r"^---\n(.*?)\n---\n", text, re.S)
          assert match, "SKILL.md frontmatter is missing"
          frontmatter = yaml.safe_load(match.group(1))
          assert frontmatter["name"] == "app-store-connect-release"
          assert len(frontmatter["description"]) <= 1024
          interface = yaml.safe_load(Path("agents/openai.yaml").read_text(encoding="utf-8"))
          assert "$app-store-connect-release" in interface["interface"]["default_prompt"]
          print("Skill metadata is valid")
          PY
      - name: Validate multilingual documentation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path("..").resolve()
          guides = [
              root / "docs/en/quick-start.md",
              root / "docs/zh-CN/quick-start.md",
              root / "docs/ja/quick-start.md",
          ]
          required = (
              "$app-store-connect-release",
              "ASC_API_KEY_ID",
              "ASC_API_ISSUER_ID",
              "ASC_API_KEY_PATH",
              "--confirm-upload",
          )
          image_sets = []
          for guide in guides:
              text = guide.read_text(encoding="utf-8")
              assert text.count("```") % 2 == 0, f"Unclosed code fence: {guide}"
              images = re.findall(r"!\[[^]]*\]\(([^)]+)\)", text)
              assert len(images) == 8, f"Expected 8 tutorial images in {guide}"
              for image in images:
                  assert (guide.parent / image).resolve().is_file(), f"Missing {image} from {guide}"
              for token in required:
                  assert token in text, f"Missing {token} from {guide}"
              image_sets.append(images)
          assert image_sets[0] == image_sets[1] == image_sets[2], "Tutorial image order differs by language"
          print("Multilingual documentation is valid")
          PY
      - name: Compile Python scripts
        run: python -m py_compile scripts/*.py tests/*.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
